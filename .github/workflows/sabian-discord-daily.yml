name: Sabian Discord Daily

on:
  schedule:
    # Temporary schedule test: every 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Send daily Sabian message
        run: node outputs/sabian-message-tool/discord-delivery/send-daily-discord.mjs outputs/sabian-message-tool/discord-delivery/discord-config.example.json
